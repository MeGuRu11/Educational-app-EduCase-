<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 256 256" width="256" height="256">
  <!-- START NODE -->
  <circle cx="128" cy="58" r="22" fill="#005eb0"/>
  <!-- ECG / pulse line -->
  <polyline points="112,58 118,58 121,48 124,68 127,54 130,62 133,58 144,58" fill="none" stroke="#5bbfff" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- DECISION NODE -->
  <polygon points="128,108 150,129 128,150 106,129" fill="#005eb0"/>
  <text x="128" y="136" text-anchor="middle" font-size="20" font-weight="bold" fill="#ffffff" font-family="sans-serif">?</text>

  <!-- SUCCESS NODE -->
  <circle cx="196" cy="196" r="18" fill="#107C10"/>
  <polyline points="187,196 195,204 207,185" fill="none" stroke="#ffffff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- FAIL NODE -->
  <circle cx="60" cy="196" r="18" fill="#C42B1C"/>
  <line x1="53" y1="189" x2="67" y2="203" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>
  <line x1="67" y1="189" x2="53" y2="203" stroke="#ffffff" stroke-width="2.5" stroke-linecap="round"/>

  <!-- CONNECTOR LINES -->
  <line x1="128" y1="80" x2="128" y2="108" stroke="#4DA3E8" stroke-width="4.5" stroke-linecap="round"/>
  <line x1="144" y1="144" x2="188" y2="183" stroke="#4ee87a" stroke-width="3.5" stroke-linecap="round"/>
  <line x1="112" y1="144" x2="68" y2="183" stroke="#ff99a4" stroke-width="3" stroke-linecap="round" stroke-dasharray="8 6"/>
</svg>